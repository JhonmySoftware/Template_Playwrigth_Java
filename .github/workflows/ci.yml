name: CI Playwright Java

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, Test and Publish Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Compile project
        run: ./mvnw -B -q -DskipTests compile

      - name: Install Playwright browsers for CI
        run: ./mvnw exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium"

      - name: Run automated tests
        run: ./mvnw -B clean verify -Dbrowser=chromium -Dheadless=true -Dslow.mo=0

      - name: Generate Maven HTML report
        if: always()
        run: ./mvnw -B surefire-report:report-only -DskipTests

      - name: Upload Maven and TestNG reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            target/reports/**
            target/surefire-reports/**
            target/site/jacoco/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: target/artifacts/**
          if-no-files-found: warn
          retention-days: 14

      - name: Run Sonar analysis
        if: ${{ vars.SONAR_HOST_URL != '' && vars.SONAR_PROJECT_KEY != '' && secrets.SONAR_TOKEN != '' }}
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          ORG_ARG=""
          if [ -n "${SONAR_ORGANIZATION}" ]; then
            ORG_ARG="-Dsonar.organization=${SONAR_ORGANIZATION}"
          fi

          ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar \
            -DskipTests \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.junit.reportPaths=target/surefire-reports \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            ${ORG_ARG}

      - name: Sonar not configured
        if: ${{ !(vars.SONAR_HOST_URL != '' && vars.SONAR_PROJECT_KEY != '' && secrets.SONAR_TOKEN != '') }}
        run: echo "Sonar step skipped. Configure SONAR_HOST_URL, SONAR_PROJECT_KEY and SONAR_TOKEN in repository settings."
